name: Veille d'actualités (automatisation)

# Veille éditoriale « humaine » : se réveille plusieurs créneaux par jour en
# heures de bureau (Europe/Paris), et c'est le script qui décide, avec une part
# d'aléatoire, de publier ou non (cible 1–3 articles/semaine, jamais la nuit).
#
# Prérequis (une seule fois) : ajouter le secret ANTHROPIC_API_KEY
#   Settings → Secrets and variables → Actions → New repository secret
#   (clé : https://console.anthropic.com/ → API Keys)
#
# Lancement manuel possible : onglet Actions → « Veille d'actualités » → Run.

on:
  schedule:
    # Heures UTC choisies pour tomber en journée à Paris (été comme hiver).
    # 4 créneaux/jour — doit correspondre à SLOTS_PER_DAY dans publish-news.mjs.
    - cron: '17 8 * * *'
    - cron: '41 11 * * *'
    - cron: '23 14 * * *'
    - cron: '9 16 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer la publication (ignore la cadence)'
        type: boolean
        default: false
      draft:
        description: 'Publier en brouillon (draft: true)'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

# Une seule exécution à la fois (évite les collisions sur le ledger).
concurrency:
  group: news
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Veille et rédaction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_FORCE: ${{ inputs.force && '1' || '0' }}
          NEWS_DRAFT: ${{ inputs.draft && '1' || '0' }}
        run: npm run news

      - name: Commiter l'article et déclencher le déploiement
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/actualites scripts/news-ledger.json
          if git diff --staged --quiet; then
            echo "Aucun nouvel article ce passage."
          else
            git commit -m "Actualité (veille automatique)"
            git push origin main
            # Les commits poussés par GITHUB_TOKEN ne déclenchent pas d'autres
            # workflows : on relance donc explicitement le déploiement.
            gh workflow run deploy.yml --ref main
          fi
